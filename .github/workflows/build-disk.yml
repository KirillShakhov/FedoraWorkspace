name: build-disk

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/build-disk.yml
  workflow_run:
    workflows: [build-container]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Bootc image reference"
        required: false
        default: ""
      disk_type:
        description: "Disk artifact type"
        required: true
        default: "qcow2"
        type: choice
        options:
          - qcow2
          - raw

env:
  IMAGE_NAME: fedora-workspace
  REGISTRY: ghcr.io

concurrency:
  group: build-disk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  disk:
    name: Build bootable disk image
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Select disk build inputs
        id: inputs
        run: |
          image_ref="${{ github.event.inputs.image_ref }}"
          disk_type="${{ github.event.inputs.disk_type }}"

          if [ -z "${image_ref}" ]; then
            image_ref="${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:latest"
          fi

          if [ -z "${disk_type}" ]; then
            disk_type="qcow2"
          fi

          if [ "${disk_type}" != "qcow2" ] && [ "${disk_type}" != "raw" ]; then
            echo "Unsupported disk type: ${disk_type}" >&2
            exit 1
          fi

          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "disk_type=${disk_type}" >> "$GITHUB_OUTPUT"

          if [ "${disk_type}" = "qcow2" ]; then
            echo "artifact_path=output/qcow2/disk.qcow2" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_path=output/raw/disk.raw" >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af || true
          df -h

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull bootc image
        run: sudo podman pull "${{ steps.inputs.outputs.image_ref }}"

      - name: Build disk image
        run: |
          mkdir -p output
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v ./output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type "${{ steps.inputs.outputs.disk_type }}" \
            --rootfs xfs \
            --use-librepo=True \
            "${{ steps.inputs.outputs.image_ref }}"

      - name: Upload disk artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora-workspace-${{ steps.inputs.outputs.disk_type }}
          path: ${{ steps.inputs.outputs.artifact_path }}
          if-no-files-found: error
          retention-days: 7
