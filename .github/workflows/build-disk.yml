name: build-disk

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Bootc image reference"
        required: false
        default: ""

env:
  IMAGE_NAME: fedora-workspace
  REGISTRY: ghcr.io

jobs:
  qcow2:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Select image reference
        id: image
        run: |
          if [ -n "${{ github.event.inputs.image_ref }}" ]; then
            echo "ref=${{ github.event.inputs.image_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull bootc image
        run: sudo podman pull "${{ steps.image.outputs.ref }}"

      - name: Build qcow2
        run: |
          mkdir -p output
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v ./disk_config/config.toml:/config.toml:ro \
            -v ./output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type qcow2 \
            --rootfs xfs \
            --use-librepo=True \
            "${{ steps.image.outputs.ref }}"

      - name: Upload qcow2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora-workspace-qcow2
          path: output/qcow2/disk.qcow2
          if-no-files-found: error
