name: build-disk

on:
  workflow_dispatch:
    inputs:
      image_ref:
        description: "Bootc image reference"
        required: false
        default: ""
      disk_type:
        description: "Disk artifact type"
        required: true
        default: "qcow2"
        type: choice
        options:
          - qcow2
          - raw

env:
  IMAGE_NAME: fedora-workspace
  REGISTRY: ghcr.io

concurrency:
  group: build-disk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  disk:
    name: Build bootable disk image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Select image reference
        id: image
        run: |
          if [ -n "${{ github.event.inputs.image_ref }}" ]; then
            echo "ref=${{ github.event.inputs.image_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ env.REGISTRY }}/${{ steps.owner.outputs.owner }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker system prune -af || true
          df -h

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Login to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull bootc image
        run: sudo podman pull "${{ steps.image.outputs.ref }}"

      - name: Build disk image
        run: |
          mkdir -p output
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v ./output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type "${{ github.event.inputs.disk_type }}" \
            --rootfs xfs \
            --use-librepo=True \
            "${{ steps.image.outputs.ref }}"

      - name: Upload disk artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora-workspace-${{ github.event.inputs.disk_type }}
          path: output/${{ github.event.inputs.disk_type }}/disk.${{ github.event.inputs.disk_type }}
          if-no-files-found: error
          retention-days: 7
